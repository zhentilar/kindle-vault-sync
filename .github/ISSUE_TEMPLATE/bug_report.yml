name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear and reproducible report.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: Digest output misses some recent notes
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps
      placeholder: |
        1. Run command...
        2. Use config...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, command used
      placeholder: macOS, Python 3.11, kindle-vault-sync preview --config config.json
    validations:
      required: true
